name: CI

on:
  push:
    branches: ["main", "copilot/**"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dev dependencies
        run: pip install ruff

      - name: Ruff check
        run: ruff check src/ scripts/ tests/

      - name: Ruff format check
        run: ruff format --check src/ scripts/ tests/

  test:
    name: Tests + smoke pipeline
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install package + dev dependencies
        run: pip install -e ".[dev]"

      - name: Run unit tests
        run: pytest tests/ -v --tb=short

      - name: Smoke pipeline (end-to-end)
        run: |
          python scripts/make_tiny_sample.py
          # Capture the RUN_ID printed by run_prepare.py
          OUTPUT=$(python scripts/run_prepare.py --config configs/baseline.yaml)
          RUN_ID=$(echo "$OUTPUT" | grep '^RUN_ID=' | cut -d= -f2)
          echo "RUN_ID=$RUN_ID"
          python scripts/run_infer.py  --config configs/baseline.yaml --run-id "$RUN_ID"
          python scripts/run_eval.py   --config configs/baseline.yaml --run-id "$RUN_ID"
          # Verify outputs exist
          test -f "outputs/$RUN_ID/metrics/summary.json"
          echo "Smoke pipeline passed."
